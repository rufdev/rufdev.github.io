<!DOCTYPE html>
<html>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<head>
    <title>CMSC 207 Calculator</title>
    <style>
        html,
        body {
            font-size: 100%;
            box-sizing: border-box;
            background-color: #ffeead;
        }
       
        .container {
            border: 1px solid #ccc;
            border-radius: 5px;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width:80%;
            max-width:400px;
            
        }

        .container > div {
            display: grid;
            justify-content: end;
            align-items: center;
            color: #ffeead;
            padding: 5px;
            
            
        }

        .display {
            grid-column: 1/-1;
            background-color: #9a96ce;
        }
        button {
            background-color: #fff;
            border-radius: 3px;
            border: 1px solid #c4c4c4;
            background-color: #ffcc5c;
            color: #ffeead;
           
            /* background-image: linear-gradient(to bottom, transparent, transparent 50%, rgba(0, 0, 0, .04));
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, .05), inset 0 1px 0 0 rgba(255, 255, 255, .45), inset 0 -1px 0 0 rgba(255, 255, 255, .15), 0 1px 0 0 rgba(255, 255, 255, .15);
            text-shadow: 0 1px rgba(255, 255, 255, .4); */
        }

        button:hover {
            background-color: #f02020;
        }

        .operator {
            background-color: #6eca9c;
            color: #ffeead;
        }

        .func {
            background-color: #f0595f;
            border-color: #b0353a;
            color: #fff;
        }

        .func:hover {
            background-color: #f17377;
        }

        .container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-gap: 10px;
            padding: 10px;
        }

        @media screen and (orientation:portrait) {
            .container >div{
                height: 3rem;
                font-size: 2rem;
               
            }
            button{
                height: 3rem;
                font-size: 2rem;
            }
            
        }

        @media  (max-width:320px) and (orientation:portrait) {
            .container >div{
                height: 2rem;
                font-size: 1rem;
               
            }
            button{
                height: 2rem;
                font-size: 1rem;
            }
            
        }
        @media (min-width:568px) and (orientation:landscape) {
            .container >div{
                height: 1rem;
                font-size: 1rem;
            }
            
        }
        @media (min-width:640px) and (orientation:landscape) {
            .container >div{
                height: 2rem;
                font-size: 1rem;
            }
           
            
        }
        @media (min-width:1024px) and (orientation:landscape) {
            .container >div{
                height: 3rem;
                font-size: 2rem;
               
            }
            button{
                height: 3rem;
                font-size: 2rem;
            }
           
            
        }
    </style>
</head>

<body>
    <div class="container">
        <div id="history" class="display"></div>
        <div id="output" class="display"></div>
        <button type="button" class="operator" data-operator="sin">sin</button>
        <button type="button" class="operator" data-operator="cos">cos</button>
        <button type="button" class="operator" data-operator="tan">tan</button>
        <button type="button" class="operator" data-operator="log">log</button>
        <button type="button" class="operator" data-operator="percent">%</button>
        <button type="button" class="operator" data-operator="root">√</button>
        <button type="button" class="operator" data-operator="square">x²</button>
        <button type="button" class="operator" data-operator="fraction">1/x</button>
        <button type="button" class="func" onclick="clearexpression()">CE</button>
        <button type="button" class="func" onclick="clearall()">C</button>
        <button type="button" class="func" onclick="backspace()">⌫</button>
        <button type="button" class="operator" data-operator="div">&divide;</button>
        <button type="button" class="num" data-number="7">7</button>
        <button type="button" class="num" data-number="8">8</button>
        <button type="button" class="num" data-number="9">9</button>
        <button type="button" class="operator" data-operator="mul">&times;</button>
        <button type="button" class="num" data-number="4">4</button>
        <button type="button" class="num" data-number="5">5</button>
        <button type="button" class="num" data-number="6">6</button>
        <button type="button" class="operator" data-operator="sub">-</button>
        <button type="button" class="num" data-number="1">1</button>
        <button type="button" class="num" data-number="2">2</button>
        <button type="button" class="num" data-number="3">3</button>
        <button type="button" class="operator" data-operator="add">+</button>
        <button type="button" class="func" onclick="toggleposneg()">±</button>
        <button type="button" class="num" data-number="0">0</button>
        <button type="button" class="func" onclick="addDecimal()">.</button>
        <button type="button" class="func" onclick="equals()">=</button>
    </div>

    <script>
        window.addEventListener("load", function () {
            clearall();
            addnumevent();
            addoperatorevent();
            console.log(!isNaN('(3)'));
        });

        window.addEventListener("keyup", function (event) {
            let key = event.which || event.keyCode;
            if ((key >= 48 && key <= 57) || (key >= 96 && key <= 111)) {
                if (key >= 96 && key <= 105) {
                    key -= 48
                }

                switch (key) {
                    case 106:
                        // multiply
                        setOp("mul");
                        break;
                    case 107:
                        // add
                        setOp("add");
                        break;
                    case 109:
                        // subtract
                        setOp("sub");
                        break;
                    case 110:
                        // decimal point 
                        addDecimal();
                        break;
                    case 111:
                        // divide
                        setOp("div");
                        break;
                    default:
                        setNum(String.fromCharCode(key));
                        break;
                }
                // console.log(String.fromCharCode(key));
            } else if (key == 13) {
                equals();
            } else if (key == 8) {
                backspace();
            } else if (key == 27) {
                clearall();
            }
            // console.log(key);

        });

        let el = function (element) {
            if (element.charAt(0) === "#") {
                return document.querySelector(element);
            }
            return document.querySelectorAll(element);
        };

        let history = el("#history");
        let output = el("#output");
        let operators = el(".operator");
        let numbers = el(".num");
        let currentnumber;
        let expression;
        let currentoperator;


        let setNum = function (element) {

            if (output.innerHTML == "0") currentnumber = "";
            if (expression.length == 0 && currentnumber.length == 0) currentnumber = "";
            if (element instanceof Object) currentnumber += element.getAttribute("data-number");
            else currentnumber += element

            // console.log(expression);
            output.innerHTML = currentnumber;
        };

        let setOp = function (element) {
            
            if (expression.length > 0) {
                console.log(expression);
                console.log(currentnumber);
                expression += currentnumber;
                
                if (!evalutateexpression()) return;
                if (isNaN(expression)) expression = `(${expression})`;
                

            }

            if (element instanceof Object) parseExpression(element.getAttribute("data-operator"));
            else parseExpression(element);
            currentnumber = "";



        };

        function addnumevent() {
            for (i = 0; i < numbers.length; i++) {
                numbers[i].addEventListener("click", function () {
                    setNum(this)
                });
            }
        }

        function addoperatorevent() {
            for (i = 0; i < operators.length; i++) {
                operators[i].addEventListener("click", function () {
                    setOp(this);
                });
            }
        }

        function parseExpression(operator) {
            currentoperator = operator;
            if (expression.length == 0 && currentnumber.length == 0) {
                expression = output.innerHTML;
            } else if (expression.length == 0) {
                expression = currentnumber;
            } 
            
            switch (operator) {
                case "add":
                    expression += '+';
                    break;

                case "sub":
                    expression += '-';
                    break;

                case "mul":
                    expression += '×';
                    break;

                case "div":
                    expression += '÷';
                    break;
                case "percent":
                    expression += '%';
                    break;
                case "root":
                    expression = `Math.sqrt(${expression})`;
                    break;

                case "square":
                    expression = `Math.pow(${expression},2)`;
                    break;

                case "fraction":
                    expression = `1/${expression}`;
                    break;
                case "sin":
                    expression = `Math.sin(${expression})`;
                    break;
                case "cos":
                    expression = `Math.cos(${expression})`;
                    break;

                case "tan":
                    expression = `Math.tan(${expression})`;
                    break;

                case "log":
                    expression = `Math.log(${expression})`;
                    break;    
            }

            let displayexpression = expression.replace("*", "×").replace("/", "÷");
            if (expression.includes('Math.sqrt')) displayexpression = displayexpression.replace('Math.sqrt','sqrt');
            if (expression.includes('Math.pow')) displayexpression = displayexpression.replace('Math.pow','sqr');
            if (expression.includes('Math.sin')) displayexpression = displayexpression.replace('Math.sin','sin');
            if (expression.includes('Math.cos')) displayexpression = displayexpression.replace('Math.cos','cos');
            if (expression.includes('Math.tan')) displayexpression = displayexpression.replace('Math.tan','tan');
            if (expression.includes('Math.log')) displayexpression = displayexpression.replace('Math.log','log');
            // else displayexpression = displayexpression.replace(/[()]/g, '')
            history.innerHTML = displayexpression
        }


        function equals() {
            
            if (expression.length > 0) {
                expression += currentnumber;
            }else{
                parseExpression(currentoperator);
                expression += currentnumber;
            }
            history.innerHTML = "";
            evalutateexpression();
            
        }
        function evalutateexpression() {
            expression = expression.replace("×", "*");
            expression = expression.replace("÷", "/");
            if(expression.endsWith('%')){
                expression = expression.replace("%", "/100");
            }else if (expression.includes('%')){
                // let matches = expression.match(/\(([^)]+)\)/g);
                let secondnumber = expression.substring(expression.indexOf("%")+1);
                if (!isNaN(secondnumber)){
                    expression = expression.replace('%'+ secondnumber, "/100*"+ secondnumber);
                }
               
            }



            try {
                console.log(expression);
                let answer = eval(expression);
                if (answer || answer == 0){
                    output.innerHTML = answer;
                    expression = answer;
                } 
                
                console.log(`= ${answer}`);
                return true
            } catch (e) {
                console.log(e);
            }
            return false;


        }
        function clearexpression() {
            output.innerHTML = "0";
            currentnumber = "";
        }
        function clearall() {
            output.innerHTML = "0";
            history.innerHTML = "";
            currentnumber = "";
            expression = "";

        }
        function backspace() {
            currentnumber = output.innerHTML
            currentnumber = currentnumber.slice(0, -1);
            if (currentnumber.length == 0) {
                clearall();
                return;
            }
            output.innerHTML = currentnumber;
        }

        function addDecimal() {
            currentnumber = output.innerHTML
            if (!currentnumber.includes('.')) currentnumber += '.';
        }

        function toggleposneg() {
            currentnumber = output.innerHTML

            if (!currentnumber.includes('-') && currentnumber !== "0") {
                currentnumber = `-${currentnumber}`;
            } else {
                currentnumber = currentnumber.replace("-", "");

            }
            output.innerHTML = currentnumber
        }

    </script>
</body>

</html>
